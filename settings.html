<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Island Bible Trivia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: url('2600768.png') no-repeat center center fixed;
    background-size: cover;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    overflow:hidden;
}

.container-box{
    background:rgba(0,0,0,0.8);
    padding:50px 35px;
    border-radius:15px;
    text-align:center;
    width:400px;
}
.floating{
    position:absolute;
    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;
    pointer-events:none;
    z-index:1;

    animation: floatDrift linear infinite;
}

@keyframes floatDrift{

0%{
transform: translateY(100vh) translateX(0px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

25%{
transform: translateY(75vh) translateX(40px) rotate(90deg);
}

50%{
transform: translateY(50vh) translateX(-30px) rotate(180deg);
}

75%{
transform: translateY(25vh) translateX(40px) rotate(270deg);
}

100%{
transform: translateY(-10vh) translateX(-30px) rotate(360deg);
opacity:0;
}

}

@keyframes floatUp{
    0%{
        transform:translateY(0px) rotate(0deg);
        opacity:0;
    }

    10%{opacity:1;}

    50%{
        transform:translateY(-50vh) translateX(30px) rotate(180deg);
    }

    100%{
        transform:translateY(-100vh) translateX(-30px) rotate(360deg);
        opacity:0;
    }
}
h1{
    margin-bottom:25px;
}

.volume-section{
    margin-bottom:25px;
}

input[type=range]{
    width:100%;
}

.volume-value{
    font-weight:bold;
    margin-top:5px;
}
</style>
</head>

<body>
<!-- Persistent Music -->
<iframe src="music.html" style="display:none;" id="musicFrame"></iframe>

<!-- Music Toggle Button -->
<button id="toggleBtn" style="position:fixed; top:20px; right:20px; z-index:50;">
  Pause Music
</button>

<div class="container-box">

<h1>Settings</h1>

<div class="volume-section">
    <h5>Game Volume</h5>
    <input type="range" min="0" max="100" id="gameSlider">
    <div class="volume-value" id="gameValue">50%</div>
</div>

<div class="volume-section">
    <h5>Music Volume</h5>
    <input type="range" min="0" max="100" id="musicSlider">
    <div class="volume-value" id="musicValue">50%</div>
</div>

<button id="muteBtn" class="btn btn-dark">
Mute / Unmute Music
</button>

<a href="index.html" class="btn btn-light mt-3">
Back to Home
</a>

</div>

<!-- Persistent Music Iframe -->
<iframe src="music.html" style="display:none;" id="musicFrame"></iframe>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ------------------------------
   Load Saved Settings
--------------------------------*/
let gameVolume = parseInt(localStorage.getItem('gameVolume')) || 50;
let musicVolume = parseInt(localStorage.getItem('musicVolume')) || 50;
let isMuted = JSON.parse(localStorage.getItem('musicMuted')) || false;

const gameSlider = document.getElementById("gameSlider");
const musicSlider = document.getElementById("musicSlider");
const gameValue = document.getElementById("gameValue");
const musicValue = document.getElementById("musicValue");

gameSlider.value = gameVolume;
musicSlider.value = musicVolume;

updateDisplay();

/* ------------------------------
   Update Display Values
--------------------------------*/
function updateDisplay() {
    gameValue.textContent = gameSlider.value + "%";
    musicValue.textContent = musicSlider.value + "%";
}

/* ------------------------------
   Game Volume Slider
--------------------------------*/
gameSlider.addEventListener("input", () => {
    gameVolume = parseInt(gameSlider.value);
    updateDisplay();
    localStorage.setItem("gameVolume", gameVolume);
});

/* ------------------------------
   Music Volume Slider
--------------------------------*/
musicSlider.addEventListener("input", () => {
    musicVolume = parseInt(musicSlider.value);
    updateDisplay();
    localStorage.setItem("musicVolume", musicVolume);

    // Send new volume to music iframe
    const musicFrame = document.getElementById('musicFrame');
    if(musicFrame && musicFrame.contentWindow){
        musicFrame.contentWindow.postMessage({volume: musicVolume, muted: isMuted}, '*');
    }
});

/* ------------------------------
   Mute / Unmute Music
--------------------------------*/
document.getElementById("muteBtn").addEventListener("click", () => {
    isMuted = !isMuted;
    updateDisplay();
    localStorage.setItem("musicMuted", isMuted);

    // Send mute status to music iframe
    const musicFrame = document.getElementById('musicFrame');
    if(musicFrame && musicFrame.contentWindow){
        musicFrame.contentWindow.postMessage({volume: musicVolume, muted: isMuted}, '*');
    }
});
</script>
<script src="floating.js"></script>
</body>
</html>
