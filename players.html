<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players - Island Challenge</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(to right,#1e3c72,#2a5298);min-height:100vh;display:flex;justify-content:center;align-items:center;color:white;font-family:Arial,sans-serif;}
.container-box{background:rgba(0,0,0,0.75);padding:50px 30px;border-radius:15px;text-align:center;width:350px;}
.container-box a{display:block;margin:12px 0;width:100%;font-size:1.2rem;}
.container-box a:hover{transform:scale(1.05);transition:0.2s;}
h1{margin-bottom:20px;}
</style>
</head>
<body>

<div class="container-box">
<h1>Enter Player Names</h1>
<a id="nextButton" class="btn btn-success" href="#">Next</a>
<a href="game.html" class="btn btn-light mt-3">Back to Game Modes</a>
</div>

<script>
// Get mode from URL
const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode');
document.getElementById('nextButton').href = `name.html?mode=${mode}`;
</script>

</body>
</html>
