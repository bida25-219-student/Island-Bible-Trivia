<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Bible Trivia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(to right,#1e3c72,#2a5298);
    min-height: 100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    color:white;
}
.container-box {
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 15px;
    text-align:center;
    width: 500px;
}
h1,h3{margin-bottom:20px;}
button.answerBtn {
    display:block;
    margin:10px 0;
    width:100%;
    font-size:1.1rem;
    padding:8px;
    border-radius:5px;
    border:none;
    background:white;
    color:black;
}
button.answerBtn.correct { background: green; color:white; }
button.answerBtn.wrong { background: red; color:white; }
button.answerBtn:hover{background:#ddd;}
.progress { height: 20px; margin:4px 0; }
#scoreboard{margin-top:15px;text-align:left;}
#questionArea{margin-top:20px;}
#timer { margin-top:10px; font-weight:bold; font-size:1.2rem; }
</style>
</head>
<body>

<div class="container-box">
<h1>Island Bible Trivia</h1>
<h3 id="modeDisplay">Mode:</h3>
<h3 id="difficultyDisplay">Difficulty:</h3>

<div id="timer"></div>
<div id="scoreboard"></div>
<div id="questionArea"></div>

<button id="nextBtn" style="display:none;">Next Question</button>
<a href="playerdifficulty.html" class="btn btn-light mt-3">Back to Difficulty</a>
</div>

<script>
// --- Retrieve game data ---
const mode = localStorage.getItem('selectedMode') || 'Solo';
const difficulty = localStorage.getItem('selectedDifficulty') || 'Normal';
const players = JSON.parse(localStorage.getItem('playerNames')) || ['Player1'];
const soloMode = (mode === "Solo");

// --- Display mode/difficulty ---
document.getElementById('modeDisplay').textContent=`Mode: ${mode}`;
document.getElementById('difficultyDisplay').textContent=`Difficulty: ${difficulty}`;

// --- Questions (40 per difficulty) ---
// For brevity, here are 10 sample questions per difficulty.
// You can extend each array to 40 questions.
const easyQuestions = [
  {q:"Who built the Ark?", a:["Moses","Noah","Abraham","David"], correct:1},
  {q:"Who was swallowed by a big fish?", a:["Jonah","Daniel","Elijah","Peter"], correct:0},
  {q:"First man created?", a:["Adam","Noah","Moses","Abel"], correct:0},
  {q:"Who received the Ten Commandments?", a:["Moses","Aaron","Joshua","David"], correct:0},
  {q:"Name of the garden God placed Adam?", a:["Eden","Gethsemane","Nazareth","Bethlehem"], correct:0},
  {q:"Who is the mother of Jesus?", a:["Mary","Martha","Elizabeth","Rachel"], correct:0},
  {q:"Who betrayed Jesus?", a:["Peter","Judas","Thomas","John"], correct:1},
  {q:"How many days did God take to create the world?", a:["5","6","7","8"], correct:1},
  {q:"Who was the first king of Israel?", a:["Saul","David","Solomon","Samuel"], correct:0},
  {q:"What sea did Moses part?", a:["Red Sea","Dead Sea","Mediterranean","Sea of Galilee"], correct:0}
];

const normalQuestions = [
  {q:"Which prophet confronted Ahab?", a:["Elijah","Elisha","Isaiah","Jeremiah"], correct:0},
  {q:"Who interpreted Pharaoh's dream?", a:["Joseph","Daniel","Moses","David"], correct:0},
  {q:"Who was thrown into the lion's den?", a:["Daniel","Shadrach","Meshach","Abednego"], correct:0},
  {q:"Which apostle doubted Jesus' resurrection?", a:["Thomas","Peter","John","Paul"], correct:0},
  {q:"How many books in the New Testament?", a:["27","39","66","12"], correct:0},
  {q:"Who led Israelites into the Promised Land?", a:["Joshua","Moses","Caleb","Aaron"], correct:0},
  {q:"What river did John baptize people in?", a:["Jordan","Nile","Euphrates","Tigris"], correct:0},
  {q:"Who denied Jesus three times?", a:["Peter","Paul","James","John"], correct:0},
  {q:"Who wrote most of the Psalms?", a:["David","Solomon","Moses","Asaph"], correct:0},
  {q:"Which book is about love?", a:["Song of Solomon","Genesis","Exodus","Leviticus"], correct:0}
];

// Add hardQuestions, veryHardQuestions, legendaryQuestions here (40 each) ...

// --- Select questions based on difficulty ---
let allQuestions = [];
switch(difficulty){
    case 'Easy': allQuestions=easyQuestions; break;
    case 'Normal': allQuestions=normalQuestions; break;
    case 'Hard': allQuestions=hardQuestions; break;
    case 'Very Hard': allQuestions=veryHardQuestions; break;
    case 'Legendary': allQuestions=legendaryQuestions; break;
}

// Shuffle
function shuffle(array){return array.sort(()=>Math.random()-0.5);}
const questions = shuffle(allQuestions);

// --- Game logic ---
let playerScores = {};
players.forEach(p=>playerScores[p]=0);
let currentQuestionIndex = 0;
let timerInterval;
const questionTime = 10;

const scoreboard = document.getElementById('scoreboard');
const questionArea = document.getElementById('questionArea');
const nextBtn = document.getElementById('nextBtn');
const timerDiv = document.getElementById('timer');

function updateScoreboard(){
    if(soloMode){
        const p = players[0];
        scoreboard.innerHTML = `<h4>Score:</h4>
        <div class="progress">
            <div class="progress-bar" role="progressbar" style="width:${playerScores[p]*2.5}%" aria-valuenow="${playerScores[p]*2.5}" aria-valuemin="0" aria-valuemax="100"></div>
        </div>`;
    } else {
        scoreboard.innerHTML="<h4>Scores:</h4>" + 
        players.map(p=>`
        ${p}: 
        <div class="progress">
          <div class="progress-bar" role="progressbar" style="width:${playerScores[p]*2.5}%" aria-valuenow="${playerScores[p]*2.5}" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        `).join('');
    }
}

function startTimer(callback){
    let timeLeft = questionTime;
    timerDiv.textContent = `Time: ${timeLeft}s`;
    timerInterval = setInterval(()=>{
        timeLeft--;
        timerDiv.textContent = `Time: ${timeLeft}s`;
        if(timeLeft<=0){
            clearInterval(timerInterval);
            callback(-1);
        }
    },1000);
}

function showQuestion(){
    const qObj = questions[currentQuestionIndex];
    questionArea.innerHTML = `<h5>Question ${currentQuestionIndex+1} of ${questions.length}</h5><p>${qObj.q}</p>` +
        qObj.a.map((ans,i)=>`<button class="answerBtn" data-index="${i}">${ans}</button>`).join('');
    nextBtn.style.display="none";
    clearInterval(timerInterval);
    startTimer(revealAnswer);

    document.querySelectorAll('.answerBtn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const selected = parseInt(btn.dataset.index);
            revealAnswer(selected);
        });
    });
}

function revealAnswer(selected){
    clearInterval(timerInterval);
    const qObj = questions[currentQuestionIndex];
    document.querySelectorAll('.answerBtn').forEach((btn,i)=>{
        btn.disabled=true;
        if(i===qObj.correct) btn.classList.add('correct');
        else if(i===selected) btn.classList.add('wrong');
    });

    if(selected === qObj.correct){
        if(soloMode) playerScores[players[0]]++;
        else players.forEach(p=>playerScores[p]++);
    }
    updateScoreboard();
    nextBtn.style.display="block";
}

nextBtn.addEventListener('click',()=>{
    currentQuestionIndex++;
    if(currentQuestionIndex>=questions.length){
        // End game
        if(soloMode){
            const p = players[0];
            questionArea.innerHTML = `<h4>Game Over!</h4><p>Your Final Score: ${playerScores[p]} out of ${questions.length}</p>`;
        } else {
            questionArea.innerHTML="<h4>Game Over!</h4><p>Final Scores:</p>" +
                "<ul>" +
                players.map(p=>`<li>${p}: ${playerScores[p]}</li>`).join('') +
                "</ul>";
            const maxScore = Math.max(...Object.values(playerScores));
            const winners = Object.entries(playerScores)
                .filter(([p,s])=>s===maxScore)
                .map(([p])=>p)
                .join(", ");
            questionArea.innerHTML += `<p><strong>Winner(s): ${winners}</strong></p>`;
        }
        timerDiv.style.display="none";
        nextBtn.style.display="none";
    } else {
        showQuestion();
    }
});

// Start game
updateScoreboard();
showQuestion();
</script>

</body>
</html>
