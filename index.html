<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Bible Trivia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}
.menu-box {
    background: rgba(0,0,0,0.75);
    padding: 50px 30px;
    border-radius: 15px;
    text-align: center;
    width: 320px;
}
.menu-box a {
    display: block;
    margin: 12px 0;
    width: 100%;
    font-size: 1.2rem;
}
.menu-box a:hover {
    transform: scale(1.05);
    transition: transform 0.2s;
}

/* Popup styles */
#popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 30px 25px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    cursor: grab;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    display: none; /* hidden initially */
    z-index: 10;
}
#popup h2 { margin-bottom: 20px; }
#popup button {
    margin: 10px;
    width: 100px;
    font-size: 1rem;
}
</style>
</head>
<body>

<div class="menu-box">
    <h1>Island Bible Trivia</h1>
<p>Test your knowledge of the Holy Bible in this exciting trivia challenge. 
Play solo or compete with teams and answer questions before the timer runs out!</p>

    <a href="game.html" class="btn btn-success">Start Game</a>
    <a href="settings.html" class="btn btn-secondary">Settings</a>
    <a href="instructions.html" class="btn btn-info">Instructions</a>
    <a href="help.html" class="btn btn-warning">Help</a>
    <a href="#" id="exitBtn" class="btn btn-danger">Exit</a>
</div>

<!-- Exit popup -->
<div id="popup">
    <h2>Do you want to exit the game?</h2>
    <button id="yesBtn" class="btn btn-danger">Yes</button>
    <button id="noBtn" class="btn btn-success">No</button>
</div>

<script>
// Show popup when Exit button clicked
const exitBtn = document.getElementById('exitBtn');
const popup = document.getElementById('popup');

exitBtn.addEventListener('click', ()=>{
    popup.style.display = 'block';
});

// Draggable popup
let isDragging = false;
let offsetX = 0;
let offsetY = 0;

popup.addEventListener('mousedown', (e)=>{
    isDragging = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
    popup.style.cursor = 'grabbing';
});

document.addEventListener('mouseup', ()=> {
    isDragging = false;
    popup.style.cursor = 'grab';
});

document.addEventListener('mousemove', (e)=>{
    if(isDragging){
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;

        x = Math.max(0, Math.min(window.innerWidth - popup.offsetWidth, x));
        y = Math.max(0, Math.min(window.innerHeight - popup.offsetHeight, y));

        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
    }
});

// Buttons inside popup
document.getElementById('yesBtn').addEventListener('click', ()=>{
    alert("Game will now close. Please close the browser tab/window.");
    window.location.href = "about:blank";
});

document.getElementById('noBtn').addEventListener('click', ()=>{
    popup.style.display = 'none';
});

// Fun hover effect for Yes button (dodging)
const yesBtn = document.getElementById('yesBtn');
yesBtn.addEventListener('mouseenter', ()=>{
    const maxX = popup.offsetWidth - yesBtn.offsetWidth - 10;
    const maxY = popup.offsetHeight - yesBtn.offsetHeight - 10;
    const randX = Math.floor(Math.random() * maxX);
    const randY = Math.floor(Math.random() * maxY);
    yesBtn.style.position = 'relative';
    yesBtn.style.left = randX + 'px';
    yesBtn.style.top = randY + 'px';
});

// Make popup move randomly slightly every 2 seconds
setInterval(()=>{
    if(popup.style.display === 'block'){
        const maxX = window.innerWidth - popup.offsetWidth;
        const maxY = window.innerHeight - popup.offsetHeight;
        const randX = Math.floor(Math.random() * maxX);
        const randY = Math.floor(Math.random() * maxY);
        popup.style.left = randX + 'px';
        popup.style.top = randY + 'px';
    }
}, 2000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
